<!doctype html>
<html lang="pt">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>What AI did this week for me</title>
<meta name="description" content="A newsletter semanal do Diogo Kopke. O que a IA fez por mim esta semana, em concreto.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;800&display=swap" rel="stylesheet">
<style>
  :root{ --accent:#00E5B4; --bg:#0a0e12; --card:#11161c; --line:#1e2630; --muted:#9aa7b4; }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:Montserrat,system-ui,sans-serif;background:
    radial-gradient(1200px 600px at 50% -10%, rgba(0,229,180,.10), transparent 60%), var(--bg);
    color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .card{width:100%;max-width:460px;background:var(--card);border:1px solid var(--line);
    border-radius:20px;padding:44px 36px;box-shadow:0 24px 70px rgba(0,0,0,.45)}
  .kicker{color:var(--accent);font-weight:800;font-size:12px;letter-spacing:.16em;text-transform:uppercase}
  h1{font-size:28px;font-weight:800;line-height:1.18;margin:12px 0 10px;letter-spacing:-.01em}
  p.sub{color:var(--muted);font-size:15px;line-height:1.55;margin-bottom:28px}
  form{display:flex;flex-direction:column;gap:6px}
  label{font-size:12px;font-weight:600;color:#c7d0d9;margin-top:12px}
  input{width:100%;padding:14px;border-radius:11px;border:1px solid #283340;background:#0c1116;
    color:#fff;font-size:15px;font-family:inherit;transition:border-color .15s}
  input:focus{outline:none;border-color:var(--accent)}
  button{margin-top:24px;padding:15px;border:0;border-radius:11px;cursor:pointer;background:var(--accent);
    color:#06231c;font-weight:800;font-size:16px;font-family:inherit;transition:filter .15s,transform .05s}
  button:hover{filter:brightness(1.06)}
  button:active{transform:translateY(1px)}
  button:disabled{opacity:.6;cursor:default}
  .msg{margin-top:14px;font-size:14px;line-height:1.4;min-height:18px}
  .msg.err{color:#ff7a7a}
  .foot{margin-top:24px;font-size:12px;color:#5e6b78;text-align:center}
  .done{text-align:center;padding:8px 0}
  .done .tick{width:56px;height:56px;border-radius:50%;background:rgba(0,229,180,.12);
    display:flex;align-items:center;justify-content:center;margin:0 auto 14px;color:var(--accent);font-size:30px;font-weight:800}
  .hidden{display:none}
</style>
</head>
<body>
  <div class="card">
    <div id="form-view">
      <div class="kicker">Newsletter semanal</div>
      <h1>What AI did this week for me</h1>
      <p class="sub">Todas as semanas conto o que a IA fez por mim, em concreto. Sem teoria. Deixa o teu nome e email para receberes.</p>
      <form id="f">
        <label for="name">Nome</label>
        <input id="name" name="name" type="text" autocomplete="name" required placeholder="O teu nome">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="email" required placeholder="o.teu@email.com">
        <button id="btn" type="submit">Quero receber</button>
        <div class="msg" id="msg"></div>
      </form>
      <p class="foot">Sem spam. Sais quando quiseres.</p>
    </div>

    <div id="done-view" class="done hidden">
      <div class="tick">&#10003;</div>
      <h1>Estás dentro.</h1>
      <p class="sub">A primeira edição chega no próximo envio. Até lá.</p>
    </div>
  </div>

<script>
  const API = "https://yajuapqpffigquikpxlk.supabase.co/functions/v1/newsletter-signup";
  const f = document.getElementById("f");
  const btn = document.getElementById("btn");
  const msg = document.getElementById("msg");

  f.addEventListener("submit", async (e) => {
    e.preventDefault();
    msg.textContent = ""; msg.className = "msg";
    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    if (!email.includes("@") || !email.includes(".")) {
      msg.textContent = "Verifica o email."; msg.className = "msg err"; return;
    }
    btn.disabled = true; btn.textContent = "A inscrever...";
    try {
      const r = await fetch(API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, email }),
      });
      const data = await r.json().catch(() => ({}));
      if (r.ok && data.ok) {
        document.getElementById("form-view").classList.add("hidden");
        document.getElementById("done-view").classList.remove("hidden");
        return;
      }
      msg.textContent = data.error === "invalid_email"
        ? "Email inválido. Verifica e tenta outra vez."
        : "Não consegui inscrever-te agora. Tenta daqui a pouco.";
      msg.className = "msg err";
    } catch {
      msg.textContent = "Sem ligação. Tenta outra vez.";
      msg.className = "msg err";
    } finally {
      btn.disabled = false; btn.textContent = "Quero receber";
    }
  });
</script>
</body>
</html>
